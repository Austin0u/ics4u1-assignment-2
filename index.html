<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/x-icon" href="/images/cat.jpg">
  <link rel="stylesheet" href="/style.css" />
  <title>Cubic Solver</title>
</head>

<body>
  <div id="app">
    <div class="container">
      <h1 class="title">Cubic Solver</h1>
      <form id="cubic-form">
        <div class="inputs-container">
          <div class="input-group">
            <label for="a">a-value</label>
            <input type="number" id="a" name="a" required />
          </div>
          <div class="input-group">
            <label for="b">b-value</label>
            <input type="number" id="b" name="b" required />
          </div>
          <div class="input-group">
            <label for="c">c-value</label>
            <input type="number" id="c" name="c" required />
          </div>
          <div class="input-group">
            <label for="d">d-value</label>
            <input type="number" id="d" name="d" required />
          </div>
        </div>
        <input type="submit" id="submit-button" value="Solve Cubic" />
      </form>
    </div>
    <div id="results-container"></div>
    <script type="module" src="/script.ts"></script>
</body>

</html>
